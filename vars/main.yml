---
# vars file for common

_common_requirements:
  default:
    - hostname
  Amazon-2018:
    - net-tools
  Alpine:
    - net-tools
  CentOS:
    - dbus

common_requirements: "{{ _common_requirements[ansible_facts['distribution'] ~ '-' ~ ansible_facts['distribution_major_version']] | default(_common_requirements[ansible_facts['distribution']] | default(_common_requirements['default'] )) }}"
